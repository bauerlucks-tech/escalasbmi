name: Daily Database Backup

on:
  schedule:
    # Backup diário - Todos os dias 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install @supabase/supabase-js

    - name: Create backup directory
      run: |
        mkdir -p ./backups

    - name: Generate backup filename
      run: |
        TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
        BACKUP_FILENAME="backup_${TIMESTAMP}.sql"
        echo "BACKUP_FILENAME=${BACKUP_FILENAME}" >> $GITHUB_ENV
        echo "BACKUP_PATH=./backups/${BACKUP_FILENAME}" >> $GITHUB_ENV
        echo "Generated filename: ${BACKUP_FILENAME}"

    - name: Extract database connection info
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      run: |
        # Extrair informações de conexão da URL do Supabase
        PROJECT_REF=$(echo "${{ secrets.SUPABASE_URL }}" | sed -n 's|https://\(.*\)\.supabase\.co.*|\1|p')
        echo "PROJECT_REF=${PROJECT_REF}" >> $GITHUB_ENV
        echo "Database project reference: ${PROJECT_REF}"
        
        # O host do banco é diferente da URL HTTPS
        DB_HOST="db.${PROJECT_REF}.supabase.co"
        echo "DB_HOST=${DB_HOST}" >> $GITHUB_ENV
        echo "Database host: ${DB_HOST}"

    - name: Create database backup
      env:
        PROJECT_REF: ${{ env.PROJECT_REF }}
        DB_HOST: ${{ env.DB_HOST }}
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        BACKUP_PATH: ${{ env.BACKUP_PATH }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "🔄 Iniciando backup do banco de dados..."
        echo "Arquivo: ${{ env.BACKUP_FILENAME }}"
        echo "Host do banco: ${{ env.DB_HOST }}"
        
        # Usar REST API do Supabase para criar backup (mais confiável)
        node << 'EOF'
        const { createClient } = require('@supabase/supabase-js');
        const fs = require('fs');
        const path = require('path');

        const supabase = createClient(
          process.env.SUPABASE_URL,
          process.env.SUPABASE_SERVICE_ROLE_KEY
        );

        async function createBackup() {
          console.log('🔄 Criando backup via Supabase REST API...');
          console.log('Project: ' + process.env.PROJECT_REF);
          
          const tables = [
            'users', 
            'schedules',
            'month_schedules',
            'swap_requests',
            'vacation_requests',
            'audit_logs',
            'notifications',
            'preferences',
            'operator_requests'
          ];
          
          const backupData = {
            metadata: {
              timestamp: new Date().toISOString(),
              version: '3.0',
              project_ref: process.env.PROJECT_REF,
              backup_type: 'full',
              tables: tables
            },
            data: {},
            errors: []
          };
          
          let totalRecords = 0;
          
          for (const table of tables) {
            console.log(`📊 Exportando tabela: ${table}`);
            
            try {
              const { data, error, count } = await supabase
                .from(table)
                .select('*', { count: 'exact' });
              
              if (error) {
                console.error(`❌ Erro ao exportar ${table}:`, error.message);
                backupData.errors.push({ table, error: error.message });
                backupData.data[table] = { records: [], count: 0, error: error.message };
              } else {
                const recordCount = count || data?.length || 0;
                backupData.data[table] = { 
                  records: data || [], 
                  count: recordCount,
                  exported_at: new Date().toISOString()
                };
                totalRecords += recordCount;
                console.log(`✅ ${table}: ${recordCount} registros`);
              }
            } catch (err) {
              console.error(`❌ Exceção ao exportar ${table}:`, err.message);
              backupData.errors.push({ table, error: err.message });
              backupData.data[table] = { records: [], count: 0, error: err.message };
            }
          }
          
          backupData.metadata.total_records = totalRecords;
          backupData.metadata.total_tables = tables.length;
          backupData.metadata.successful_tables = tables.length - backupData.errors.length;
          
          // Salvar backup como JSON
          const backupPath = process.env.BACKUP_PATH.replace('.sql', '.json');
          fs.writeFileSync(backupPath, JSON.stringify(backupData, null, 2));
          
          const fileSize = fs.statSync(backupPath).size;
          console.log(`✅ Backup salvo em: ${backupPath}`);
          console.log(`📊 Total de registros: ${totalRecords}`);
          console.log(`📊 Tamanho: ${(fileSize / 1024).toFixed(2)} KB`);
          
          // Atualizar variáveis de ambiente
          fs.appendFileSync(process.env.GITHUB_ENV, `BACKUP_PATH=${backupPath}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `BACKUP_FILENAME=${path.basename(backupPath)}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `BACKUP_SIZE=${fileSize}\n`);
        }

        createBackup().catch(err => {
          console.error('❌ Erro fatal no backup:', err);
          process.exit(1);
        });
        EOF

    - name: Verify backup file
      env:
        BACKUP_PATH: ${{ env.BACKUP_PATH }}
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
      run: |
        if [ -f "${{ env.BACKUP_PATH }}" ]; then
          FILE_SIZE=$(stat -c%s "${{ env.BACKUP_PATH }}")
          echo "✅ Backup criado com sucesso!"
          echo "📁 Arquivo: ${{ env.BACKUP_FILENAME }}"
          echo "📊 Tamanho: ${FILE_SIZE} bytes"
          echo "BACKUP_SIZE=${FILE_SIZE}" >> $GITHUB_ENV
        else
          echo "❌ Falha ao criar arquivo de backup"
          exit 1
        fi

    - name: Upload backup to Supabase Storage
      env:
        BACKUP_PATH: ${{ env.BACKUP_PATH }}
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "🔄 Fazendo upload para o bucket Backup_DADOS..."
        
        node << 'EOF'
        const { createClient } = require('@supabase/supabase-js');
        const fs = require('fs');

        const supabase = createClient(
          process.env.SUPABASE_URL,
          process.env.SUPABASE_SERVICE_ROLE_KEY
        );

        async function uploadBackup() {
          try {
            console.log('📁 Lendo arquivo de backup...');
            const backupPath = process.env.BACKUP_PATH;
            const backupFile = fs.readFileSync(backupPath);
            const backupFilename = process.env.BACKUP_FILENAME;

            console.log(`📤 Fazendo upload: ${backupFilename}`);

            const { data, error } = await supabase.storage
              .from('Backup_DADOS')
              .upload(backupFilename, backupFile, {
                contentType: 'application/octet-stream',
                upsert: true
              });

            if (error) {
              console.error('❌ Erro no upload:', error);
              throw error;
            }

            console.log('✅ Upload realizado com sucesso!');
            
            // Gerar URL pública
            const { data: { publicUrl } } = supabase.storage
              .from('Backup_DADOS')
              .getPublicUrl(backupFilename);
            
            console.log(`🔗 URL do backup: ${publicUrl}`);
            console.log(`BACKUP_URL=${publicUrl}`);
            
            // Adicionar ao GITHUB_ENV
            fs.appendFileSync(process.env.GITHUB_ENV, `BACKUP_URL=${publicUrl}\n`);
            
            return publicUrl;
          } catch (error) {
            console.error('❌ Erro no upload:', error);
            throw error;
          }
        }

        uploadBackup().catch(console.error);
        EOF

    - name: Create backup metadata
      env:
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        BACKUP_SIZE: ${{ env.BACKUP_SIZE }}
        PROJECT_REF: ${{ env.PROJECT_REF }}
        BACKUP_BUCKET: 'Backup_DADOS'
        BACKUP_URL: ${{ env.BACKUP_URL }}
      run: |
        cat << 'EOF' > backup_metadata.json
        {
          "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "filename": "${{ env.BACKUP_FILENAME }}",
          "size_bytes": ${{ env.BACKUP_SIZE }},
          "project_ref": "${{ env.PROJECT_REF }}",
          "bucket": "${{ env.BACKUP_BUCKET }}",
          "url": "${{ env.BACKUP_URL }}",
          "workflow_run_id": "${{ github.run_id }}",
          "trigger": "${{ github.event_name }}"
        }
        EOF

    - name: Upload metadata to storage
      env:
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        node << 'EOF'
        const { createClient } = require('@supabase/supabase-js');
        const fs = require('fs');

        const supabase = createClient(
          process.env.SUPABASE_URL,
          process.env.SUPABASE_SERVICE_ROLE_KEY
        );

        async function uploadMetadata() {
          try {
            const metadata = fs.readFileSync('backup_metadata.json');
            const metadataFilename = `metadata_${{ env.BACKUP_FILENAME }}.json`;

            const { data, error } = await supabase.storage
              .from('Backup_DADOS')
              .upload(metadataFilename, metadata, {
                contentType: 'application/json',
                upsert: true
              });

            if (error) {
              console.error('❌ Erro no upload dos metadados:', error);
              throw error;
            }

            console.log('✅ Metadados salvos com sucesso!');
          } catch (error) {
            console.error('❌ Erro no upload dos metadados:', error);
            throw error;
          }
        }

        uploadMetadata().catch(console.error);
        EOF

    - name: Clean old backups (keep last 30 days)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "🧹 Limpando backups antigos (mantendo últimos 30 dias)..."
        
        node << 'EOF'
        const { createClient } = require('@supabase/supabase-js');

        const supabase = createClient(
          process.env.SUPABASE_URL,
          process.env.SUPABASE_SERVICE_ROLE_KEY
        );

        async function cleanOldBackups() {
          try {
            const { data, error } = await supabase.storage
              .from('Backup_DADOS')
              .list();

            if (error) {
              console.error('❌ Erro ao listar backups:', error);
              throw error;
            }

            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            const oldFiles = data.filter(file => {
              const createdDate = new Date(file.created_at);
              return createdDate < thirtyDaysAgo && file.name.includes('backup_');
            });

            console.log(`📁 Encontrados ${oldFiles.length} arquivos antigos para remover`);

            for (const file of oldFiles) {
              console.log(`🗑️ Removendo: ${file.name}`);
              const { error: deleteError } = await supabase.storage
                .from('Backup_DADOS')
                .remove([file.name]);

              if (deleteError) {
                console.error(`❌ Erro ao remover ${file.name}:`, deleteError);
              } else {
                console.log(`✅ Removido: ${file.name}`);
              }
            }

            console.log('🧹 Limpeza concluída!');
          } catch (error) {
            console.error('❌ Erro na limpeza:', error);
            throw error;
          }
        }

        cleanOldBackups().catch(console.error);
        EOF

    - name: Generate backup report
      env:
        PROJECT_REF: ${{ env.PROJECT_REF }}
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        BACKUP_SIZE: ${{ env.BACKUP_SIZE }}
        BACKUP_BUCKET: 'Backup_DADOS'
        BACKUP_URL: ${{ env.BACKUP_URL }}
      run: |
        echo "📊 Gerando relatório do backup..."
        
        cat << 'EOF' > backup_report.md
        # 🗄️ Relatório de Backup Diário
        
        ## 📋 Informações
        - **Data/Hora**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        - **Projeto**: ${{ env.PROJECT_REF }}
        - **Arquivo**: ${{ env.BACKUP_FILENAME }}
        - **Tamanho**: ${{ env.BACKUP_SIZE }} bytes
        - **Bucket**: ${{ env.BACKUP_BUCKET }}
        - **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        ## ✅ Status
        - **Backup**: Criado com sucesso
        - **Upload**: Realizado com sucesso
        - **Metadados**: Salvos com sucesso
        
        ## 🔗 Links
        - **URL do Backup**: ${{ env.BACKUP_URL }}
        - **GitHub Actions**: ${{ github.server_url }}/${{ github.repository }}/actions
        
        ---
        *Relatório gerado automaticamente pelo GitHub Actions*
        EOF

    - name: Upload backup artifacts
      uses: actions/upload-artifact@v4
      if: always()
      env:
        BACKUP_PATH: ${{ env.BACKUP_PATH }}
      with:
        name: backup-${{ github.run_number }}
        path: |
          ${{ env.BACKUP_PATH }}
          backup_metadata.json
          backup_report.md
        retention-days: 30

    - name: Success notification
      if: success()
      env:
        BACKUP_FILENAME: ${{ env.BACKUP_FILENAME }}
        BACKUP_SIZE: ${{ env.BACKUP_SIZE }}
        BACKUP_URL: ${{ env.BACKUP_URL }}
      run: |
        echo "🎉 Backup diário concluído com sucesso!"
        echo "📁 Arquivo: ${{ env.BACKUP_FILENAME }}"
        echo "📊 Tamanho: ${{ env.BACKUP_SIZE }} bytes"
        echo "🔗 URL: ${{ env.BACKUP_URL }}"
        echo "⏰ Próximo backup: $(date -d '+1 day 02:00' -u +"%Y-%m-%d %H:%M:%S UTC")"
