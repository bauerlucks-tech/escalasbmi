name: Complete System Backup

on:
  push:
    branches: [ main ]
  schedule:
    # Backup completo semanal - Domingos 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Tipo de backup'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - source_only
          - database_only

permissions:
  contents: write
  actions: write

jobs:
  backup-system:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup environment
      run: |
        echo "BACKUP_TIMESTAMP=$(date -u +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_ENV
        echo "BACKUP_DIR=./backups" >> $GITHUB_ENV
        echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
        echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
        
        # Determinar tipo de backup
        BACKUP_TYPE=${{ github.event.inputs.backup_type || 'full' }}
        echo "BACKUP_TYPE=$BACKUP_TYPE" >> $GITHUB_ENV
        echo "Tipo de backup: $BACKUP_TYPE"

    - name: Create backup directory
      env:
        BACKUP_DIR: ./backups
      run: mkdir -p ${{ env.BACKUP_DIR }}

    - name: Backup Source Code
      if: ${{ env.BACKUP_TYPE == 'full' || env.BACKUP_TYPE == 'source_only' }}
      env:
        BACKUP_DIR: ./backups
        BACKUP_TIMESTAMP: ${{ env.BACKUP_TIMESTAMP }}
      run: |
        echo "📦 Backup do código fonte..."
        tar -czf "${{ env.BACKUP_DIR }}/source-code-${{ env.BACKUP_TIMESTAMP }}.tar.gz" \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=backups \
          --exclude=dist \
          .
        
        SOURCE_SIZE=$(du -h "${{ env.BACKUP_DIR }}/source-code-${{ env.BACKUP_TIMESTAMP }}.tar.gz" | cut -f1)
        echo "SOURCE_SIZE=$SOURCE_SIZE" >> $GITHUB_ENV
        echo "✅ Código backup: $SOURCE_SIZE"

    - name: Install Supabase client
      if: ${{ env.BACKUP_TYPE == 'full' || env.BACKUP_TYPE == 'database_only' }}
      run: npm install @supabase/supabase-js

    - name: Backup Database
      if: ${{ env.BACKUP_TYPE == 'full' || env.BACKUP_TYPE == 'database_only' }}
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        BACKUP_TIMESTAMP: ${{ env.BACKUP_TIMESTAMP }}
        BACKUP_DIR: ${{ env.BACKUP_DIR }}
      run: |
        echo "🗄️ Backup do banco de dados..."
        
        # Backup usando script Node.js
        node scripts/backup-database-simple.cjs "${{ env.BACKUP_DIR }}/database-${{ env.BACKUP_TIMESTAMP }}.json"

    - name: Create backup manifest
      env:
        BACKUP_TIMESTAMP: ${{ env.BACKUP_TIMESTAMP }}
        BACKUP_DIR: ${{ env.BACKUP_DIR }}
        COMMIT_HASH: ${{ env.COMMIT_HASH }}
        COMMIT_MESSAGE: ${{ env.COMMIT_MESSAGE }}
        SOURCE_SIZE: ${{ env.SOURCE_SIZE }}
      run: |
        cat << 'EOF' > backup-manifest.json
        {
          "timestamp": "${{ env.BACKUP_TIMESTAMP }}",
          "commit": {
            "hash": "${{ env.COMMIT_HASH }}",
            "message": "${{ env.COMMIT_MESSAGE }}"
          },
          "files": {
            "source_code": {
              "path": "source-code-${{ env.BACKUP_TIMESTAMP }}.tar.gz",
              "size": "${{ env.SOURCE_SIZE }}"
            },
            "database": {
              "path": "database-${{ env.BACKUP_TIMESTAMP }}.json",
              "size": "Database backup"
            }
          }
        }
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      env:
        BACKUP_TIMESTAMP: ${{ env.BACKUP_TIMESTAMP }}
        BACKUP_DIR: ${{ env.BACKUP_DIR }}
      with:
        name: complete-backup-${{ env.BACKUP_TIMESTAMP }}
        path: |
          ${{ env.BACKUP_DIR }}/*
          backup-manifest.json
        retention-days: 30

    - name: Success notification
      env:
        SOURCE_SIZE: ${{ env.SOURCE_SIZE }}
        BACKUP_TIMESTAMP: ${{ env.BACKUP_TIMESTAMP }}
        COMMIT_HASH: ${{ env.COMMIT_HASH }}
      run: |
        echo "🎉 Backup completo realizado com sucesso!"
        echo "📦 Código fonte: ${{ env.SOURCE_SIZE }}"
        echo "🗄️ Banco de dados: Backup concluído"
        echo "⏰ Timestamp: ${{ env.BACKUP_TIMESTAMP }}"
        echo "🔗 Commit: ${{ env.COMMIT_HASH }}"
